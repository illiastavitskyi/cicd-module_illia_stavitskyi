name: ci-cd module 

on: 
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps: 
      - name: Clone code 
        uses: actions/checkout@v6

      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: RunTests
        run: pytest

      - name: Linter
        run: flake8 . 
      

      